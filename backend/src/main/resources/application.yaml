spring:
  application:
    name: java-starter
  data:
    redis:
      host: ${APP_REDIS_HOST}
      port: ${APP_REDIS_PORT}

  datasource:
    url: ${POSTGRES_DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          batch_versioned_data: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jobrunr:
  background-job-server:
    enabled: true
  dashboard:
    enabled: true
    username: lunisoft
    password: ${APP_JOBRUNR_DASHBOARD_PASSWORD}

server:
  port: ${APP_PORT:3000}

app:
  jwt:
    private-key: ${APP_JWT_PRIVATE_KEY}
    public-key: ${APP_JWT_PUBLIC_KEY}
    issuer: lunisoft-java-starter
    audience: lunisoft-java-starter
    access-token-expiration-minutes: 15
    refresh-token-expiration-minutes: 10080
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
  cors:
    allowed-origins:
      - https://localhost
  storage:
    endpoint: ${APP_STORAGE_ENDPOINT}
    region: ${APP_STORAGE_REGION:auto}
    access-key: ${APP_STORAGE_ACCESS_KEY}
    secret-key: ${APP_STORAGE_SECRET_KEY}
    bucket: ${APP_STORAGE_BUCKET}
  brevo:
    api-key: ${APP_BREVO_API_KEY}
    sender-name: Java Starter
    sender-email: contact@lunisoft.fr
  pdf:
    render-timeout-ms: ${APP_PDF_RENDER_TIMEOUT_MS:10000}
    format: ${APP_PDF_FORMAT:A4}
    print-background: ${APP_PDF_PRINT_BACKGROUND:true}

logging:
  level:
    com.lunisoft: DEBUG
