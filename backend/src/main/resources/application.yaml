spring:
  application:
    name: ultimate-java-starter-kit

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ultimatejavastarterkit}
    username: ${DATABASE_USERNAME:lunisoft}
    password: ${DATABASE_PASSWORD:ChangeMe}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${APP_PORT:3000}

app:
  jwt:
    private-key: ${APP_JWT_PRIVATE_KEY:}
    public-key: ${APP_JWT_PUBLIC_KEY:}
    access-token-expiration-minutes: 15
    refresh-token-expiration-minutes: 10080
  cookie:
    secure: ${APP_COOKIE_SECURE:false}

logging:
  level:
    com.lunisoft: DEBUG
