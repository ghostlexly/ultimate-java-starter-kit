services:
  java-starter-postgres:
    image: postgres:17.9
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lunisoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe}
      POSTGRES_DB: java-starter
    expose:
      - "5432"
    ports:
      - "127.0.0.1:5432:5432" # Bind to 127.0.0.1 to prevents remote connections to the database
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lunisoft -d java-starter" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lunisoft
    restart: unless-stopped

  java-starter-redis:
    image: redis:8.6.2-alpine
    expose:
      - "6379"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - lunisoft
    restart: unless-stopped

  java-starter-frontend:
    image: lunisoft/java-starter:frontend
    build: ./frontend
    environment:
      NODE_ENV: production
      # Server Components call the backend directly
      BACKEND_INTERNAL_URL: http://java-starter-backend:3000
    expose:
      - "3000"
    healthcheck:
      test: "curl -s http://localhost:3000 || exit 1"
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lunisoft
    restart: unless-stopped

  java-starter-backend:
    image: lunisoft/java-starter:backend
    build: ./backend
    environment:
      POSTGRES_DATABASE_URL: ${POSTGRES_DATABASE_URL}
      POSTGRES_USER: ${POSTGRES_USER:-lunisoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe}
      APP_PORT: ${APP_PORT}
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE}
      APP_JWT_PRIVATE_KEY: ${APP_JWT_PRIVATE_KEY}
      APP_JWT_PUBLIC_KEY: ${APP_JWT_PUBLIC_KEY}
      APP_STORAGE_ENDPOINT: ${APP_STORAGE_ENDPOINT}
      APP_STORAGE_ACCESS_KEY: ${APP_STORAGE_ACCESS_KEY}
      APP_STORAGE_SECRET_KEY: ${APP_STORAGE_SECRET_KEY}
      APP_STORAGE_BUCKET: ${APP_STORAGE_BUCKET}
      APP_REDIS_HOST: ${APP_REDIS_HOST}
      APP_JOBRUNR_DASHBOARD_PASSWORD: ${APP_JOBRUNR_DASHBOARD_PASSWORD}
      APP_BREVO_API_KEY: ${APP_BREVO_API_KEY}
    expose:
      - "3000"
    depends_on:
      java-starter-postgres:
        condition: service_healthy
      java-starter-redis:
        condition: service_started
    networks:
      - lunisoft
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  lunisoft:
    external: true