services:
  java-starter-postgres:
    image: postgres:17.9
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lunisoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe}
      POSTGRES_DB: java-starter
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lunisoft -d java-starter" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lunisoft

  java-starter-redis:
    image: redis:8.6.2-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - lunisoft

  java-starter-frontend:
    image: lunisoft/java-starter:frontend
    build:
      context: ./frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: "curl -s http://localhost:3000 || exit 1"
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lunisoft

  java-starter-backend:
    image: lunisoft/java-starter:backend
    build: ./backend
    expose:
      - "3000"
    environment:
      POSTGRES_DATABASE_URL: ${POSTGRES_DATABASE_URL}
      POSTGRES_USER: ${POSTGRES_USER:-lunisoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe}
      APP_JWT_PRIVATE_KEY: ${APP_JWT_PRIVATE_KEY}
      APP_JWT_PUBLIC_KEY: ${APP_JWT_PUBLIC_KEY}
      APP_STORAGE_ENDPOINT: ${APP_STORAGE_ENDPOINT}
      APP_STORAGE_ACCESS_KEY: ${APP_STORAGE_ACCESS_KEY}
      APP_STORAGE_SECRET_KEY: ${APP_STORAGE_SECRET_KEY}
      APP_STORAGE_BUCKET: ${APP_STORAGE_BUCKET}
    depends_on:
      java-starter-postgres:
        condition: service_healthy
      java-starter-redis:
        condition: service_started
    networks:
      - lunisoft

volumes:
  postgres-data:
  redis-data:

networks:
  lunisoft:
    external: true