services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    # Don't start backend in dev — run it from your IDE instead.
    # Profiles require to be run with the argument "docker compose --profile prod up -d"
    profiles:
      - prod

  caddy:
    environment:
      # Point API routes to host machine (where your IDE runs the backend)
      - BACKEND_UPSTREAM=host.docker.internal:3000
    extra_hosts:
      # "host.docker.internal" points to the host machine (where your IDE runs the backend)
      - "host.docker.internal:host-gateway"

  frontend:
    command: npm run dev -- --host
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
