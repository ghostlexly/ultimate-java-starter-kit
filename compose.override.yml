services:
  caddy:
    build:
      context: ./caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Point API routes to host machine (where your IDE runs the backend)
      - BACKEND_UPSTREAM=host.docker.internal:3000
    extra_hosts:
      # "host.docker.internal" points to the host machine (where your IDE runs the backend)
      - "host.docker.internal:host-gateway"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - lunisoft

  java-starter-postgres:
    ports:
      - "5432:5432"

  java-starter-redis:
    ports:
      - "6379:6379"

  java-starter-backend:
    # Don't start backend in dev — run it from your IDE instead.
    # Profiles require to be run with the argument "docker compose --profile prod up -d"
    profiles:
      - prod

  java-starter-frontend:
    command: npm run dev
    environment:
      - NODE_ENV=development
      # In dev the backend runs on the host machine (IDE), not in Docker.
      - BACKEND_INTERNAL_URL=http://host.docker.internal:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  caddy-data:
  caddy-config: